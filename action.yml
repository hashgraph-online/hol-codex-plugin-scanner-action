name: "HOL Codex Plugin Scanner"
description: "Scan a Codex plugin directory for security, publishability, and best practices. Scores from 0-100."
author: "HOL"

inputs:
  mode:
    description: "Execution mode: scan, lint, verify, or submit"
    required: false
    default: "scan"
  plugin_dir:
    description: "Path to a single plugin directory or a repo marketplace root (default: repository root)"
    required: false
    default: "."
  format:
    description: "Output format: text, json, markdown, or sarif"
    required: false
    default: "text"
  output:
    description: "Write report to this file path"
    required: false
    default: ""
  profile:
    description: "Policy profile to apply: default, public-marketplace, or strict-security"
    required: false
    default: "default"
  config:
    description: "Optional path to .codex-plugin-scanner.toml"
    required: false
    default: ""
  baseline:
    description: "Optional path to a baseline suppression file"
    required: false
    default: ""
  online:
    description: "Enable live network probing for verify mode"
    required: false
    default: "false"
  upload_sarif:
    description: "Upload the generated SARIF report to GitHub code scanning. Requires security-events: write in the calling workflow."
    required: false
    default: "false"
  sarif_category:
    description: "SARIF category used when upload_sarif is enabled"
    required: false
    default: "codex-plugin-scanner"
  write_step_summary:
    description: "Write a concise markdown summary to the GitHub Actions job summary"
    required: false
    default: "true"
  registry_payload_output:
    description: "Write a machine-readable Codex ecosystem payload JSON file for registry or awesome-list automation"
    required: false
    default: ""
  min_score:
    description: "Fail the job if the score is below this threshold (0-100)"
    required: false
    default: "0"
  fail_on_severity:
    description: "Fail if any finding meets or exceeds this severity (none, critical, high, medium, low, info)"
    required: false
    default: "none"
  cisco_skill_scan:
    description: "Cisco skill-scanner mode: auto, on, or off"
    required: false
    default: "auto"
  cisco_policy:
    description: "Cisco skill-scanner policy preset: permissive, balanced, or strict"
    required: false
    default: "balanced"
  install_cisco:
    description: "Install the opt-in Cisco skill-scanner dependency used by this repo"
    required: false
    default: "false"
  install_source:
    description: "Package install source: pypi for the reviewed release path, or local for source-repo dogfooding"
    required: false
    default: "pypi"
  submission_enabled:
    description: "Open submission issues for awesome-list and registry automation when the plugin clears the submission threshold"
    required: false
    default: "false"
  submission_score_threshold:
    description: "Minimum score required before a submission issue is created"
    required: false
    default: "80"
  submission_repos:
    description: "Comma-separated GitHub repositories that should receive the submission issue"
    required: false
    default: "hashgraph-online/awesome-codex-plugins"
  submission_token:
    description: "Required when submission_enabled is true; use a token with issues:write access to the submission repositories"
    required: false
    default: ""
  submission_labels:
    description: "Comma-separated labels to apply when creating submission issues"
    required: false
    default: "plugin-submission"
  submission_category:
    description: "Listing category to include in the submission issue body"
    required: false
    default: "Community Plugins"
  submission_plugin_name:
    description: "Override the plugin name used in the submission issue"
    required: false
    default: ""
  submission_plugin_url:
    description: "Override the plugin repository URL used in the submission issue"
    required: false
    default: ""
  submission_plugin_description:
    description: "Override the plugin description used in the submission issue"
    required: false
    default: ""
  submission_author:
    description: "Override the plugin author used in the submission issue"
    required: false
    default: ""
  pr_comment:
    description: "Publish a sticky PR summary comment: off, auto, or always"
    required: false
    default: "off"
  pr_comment_style:
    description: "PR comment detail level: concise or full"
    required: false
    default: "concise"
  pr_comment_header:
    description: "Optional sticky comment header override; defaults to mode/profile/plugin_dir"
    required: false
    default: ""
  pr_comment_max_findings:
    description: "Maximum number of top findings shown in the PR comment"
    required: false
    default: "3"
  pr_comment_token:
    description: "Optional token for PR comments. Defaults to github.token; requires pull-requests:write or issues:write."
    required: false
    default: ""
  pr_comment_skip_if_unchanged:
    description: "Skip updating the sticky PR comment when the rendered body is unchanged"
    required: false
    default: "true"
  pr_comment_compare_to_previous:
    description: "Include metric deltas versus the previous scanner comment on this PR"
    required: false
    default: "true"

outputs:
  score:
    description: "The numeric score (0-100)"
    value: ${{ steps.scan.outputs.score }}
  grade:
    description: "The letter grade (A-F)"
    value: ${{ steps.scan.outputs.grade }}
  grade_label:
    description: "The human-readable grade label"
    value: ${{ steps.scan.outputs.grade_label }}
  policy_pass:
    description: "Whether the selected policy profile passed"
    value: ${{ steps.scan.outputs.policy_pass }}
  verify_pass:
    description: "Whether runtime verification passed"
    value: ${{ steps.scan.outputs.verify_pass }}
  max_severity:
    description: "The most severe finding in the scan result, or none"
    value: ${{ steps.scan.outputs.max_severity }}
  findings_total:
    description: "The total number of findings across all severities"
    value: ${{ steps.scan.outputs.findings_total }}
  report_path:
    description: "The path to the rendered report file, if output was requested"
    value: ${{ steps.scan.outputs.report_path }}
  registry_payload_path:
    description: "The path to the machine-readable Codex ecosystem payload file, if requested"
    value: ${{ steps.scan.outputs.registry_payload_path }}
  submission_eligible:
    description: "Whether the plugin met the submission threshold and passed the configured severity gate"
    value: ${{ steps.scan.outputs.submission_eligible }}
  submission_performed:
    description: "Whether a submission issue was created or reused"
    value: ${{ steps.scan.outputs.submission_performed }}
  submission_issue_urls:
    description: "Comma-separated URLs for submission issues created or reused"
    value: ${{ steps.scan.outputs.submission_issue_urls }}
  submission_issue_numbers:
    description: "Comma-separated issue numbers for submission issues created or reused"
    value: ${{ steps.scan.outputs.submission_issue_numbers }}
  pr_comment_status:
    description: "PR comment result: disabled, skipped, created, updated, unchanged, or failed"
    value: ${{ steps.pr_comment.outputs.pr_comment_status }}
  pr_comment_url:
    description: "URL of the sticky PR comment when created/updated/found"
    value: ${{ steps.pr_comment.outputs.pr_comment_url }}
  pr_comment_id:
    description: "Numeric GitHub issue-comment ID when available"
    value: ${{ steps.pr_comment.outputs.pr_comment_id }}
  pr_comment_reason:
    description: "Reason for a skipped/failed PR comment operation"
    value: ${{ steps.pr_comment.outputs.pr_comment_reason }}
  action_exit_code:
    description: "Final scanner execution code after orchestration"
    value: ${{ steps.outcome.outputs.action_exit_code }}
  action_exit_reason:
    description: "Human-readable reason for scanner failure"
    value: ${{ steps.outcome.outputs.action_exit_reason }}

branding:
  icon: "check-circle"
  color: "blue"

runs:
  using: "composite"
  steps:
    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
      with:
        python-version: "3.12"

    - name: Install scanner
      shell: bash
      env:
        INSTALL_SOURCE: ${{ inputs.install_source }}
        INSTALL_CISCO: ${{ inputs.install_cisco }}
      run: |
        LOCAL_SOURCE=""
        for candidate in "$GITHUB_ACTION_PATH" "$GITHUB_ACTION_PATH/.."; do
          if [ -f "$candidate/pyproject.toml" ] && [ -d "$candidate/src/codex_plugin_scanner" ]; then
            LOCAL_SOURCE="$candidate"
            break
          fi
        done

        if [ "$INSTALL_SOURCE" = "local" ]; then
          if [ -z "$LOCAL_SOURCE" ]; then
            echo "install_source=local requires the source repository checkout (for example: uses: ./action inside codex-plugin-scanner)." >&2
            exit 1
          fi
          if [ "$INSTALL_CISCO" = "true" ]; then
            python3 -m pip install "$LOCAL_SOURCE[cisco]"
          else
            python3 -m pip install "$LOCAL_SOURCE"
          fi
        elif [ "$INSTALL_SOURCE" = "pypi" ]; then
          SCANNER_VERSION_FILE="$GITHUB_ACTION_PATH/scanner-version.txt"
          CISCO_VERSION_FILE="$GITHUB_ACTION_PATH/cisco-version.txt"
          PYPI_ATTESTATIONS_VERSION_FILE="$GITHUB_ACTION_PATH/pypi-attestations-version.txt"
          if [ ! -f "$SCANNER_VERSION_FILE" ] || [ ! -f "$CISCO_VERSION_FILE" ] || [ ! -f "$PYPI_ATTESTATIONS_VERSION_FILE" ]; then
            echo "Action install metadata files are missing from the Marketplace bundle." >&2
            exit 1
          fi

          SCANNER_VERSION="$(tr -d '[:space:]' < "$SCANNER_VERSION_FILE")"
          CISCO_VERSION="$(tr -d '[:space:]' < "$CISCO_VERSION_FILE")"
          PYPI_ATTESTATIONS_VERSION="$(tr -d '[:space:]' < "$PYPI_ATTESTATIONS_VERSION_FILE")"
          SCANNER_REPOSITORY="https://github.com/hashgraph-online/codex-plugin-scanner"
          DIST_DIR="${RUNNER_TEMP:-$GITHUB_WORKSPACE/.codex-plugin-scanner-dist}"
          mkdir -p "$DIST_DIR"

          python3 -m pip install "pypi-attestations==${PYPI_ATTESTATIONS_VERSION}"
          python3 -m pip download --only-binary=:all: --no-deps --dest "$DIST_DIR" "codex-plugin-scanner==${SCANNER_VERSION}"

          DIST_BASENAME="$(
            DIST_DIR="$DIST_DIR" python3 -c "import os; from pathlib import Path; dist_dir = Path(os.environ['DIST_DIR']); candidates = sorted(dist_dir.glob('codex_plugin_scanner-*.whl')); expected = len(candidates) == 1; print(candidates[0].name) if expected else (_ for _ in ()).throw(SystemExit(f'Expected exactly one downloaded scanner wheel, found {len(candidates)}'))"
          )"

          if ! python3 -m pypi_attestations verify pypi \
            --repository "$SCANNER_REPOSITORY" \
            "pypi:${DIST_BASENAME}"; then
            echo "Failed to verify PyPI provenance for codex-plugin-scanner==${SCANNER_VERSION}." >&2
            exit 1
          fi

          python3 -m pip install "$DIST_DIR/$DIST_BASENAME"
          if [ "$INSTALL_CISCO" = "true" ]; then
            python3 -m pip install "cisco-ai-skill-scanner==${CISCO_VERSION}"
          fi
        else
          echo "Unsupported install_source: $INSTALL_SOURCE" >&2
          exit 1
        fi

    - name: Run scanner
      id: scan
      continue-on-error: true
      shell: bash
      env:
        MODE: ${{ inputs.mode }}
        PLUGIN_DIR: ${{ inputs.plugin_dir }}
        FORMAT: ${{ inputs.format }}
        OUTPUT: ${{ inputs.output }}
        PROFILE: ${{ inputs.profile }}
        CONFIG: ${{ inputs.config }}
        BASELINE: ${{ inputs.baseline }}
        ONLINE: ${{ inputs.online }}
        UPLOAD_SARIF: ${{ inputs.upload_sarif }}
        WRITE_STEP_SUMMARY: ${{ inputs.write_step_summary }}
        REGISTRY_PAYLOAD_OUTPUT: ${{ inputs.registry_payload_output }}
        MIN_SCORE: ${{ inputs.min_score }}
        FAIL_ON: ${{ inputs.fail_on_severity }}
        CISCO_SCAN: ${{ inputs.cisco_skill_scan }}
        CISCO_POLICY: ${{ inputs.cisco_policy }}
        SUBMISSION_ENABLED: ${{ inputs.submission_enabled }}
        SUBMISSION_SCORE_THRESHOLD: ${{ inputs.submission_score_threshold }}
        SUBMISSION_REPOS: ${{ inputs.submission_repos }}
        SUBMISSION_TOKEN: ${{ inputs.submission_token }}
        SUBMISSION_LABELS: ${{ inputs.submission_labels }}
        SUBMISSION_CATEGORY: ${{ inputs.submission_category }}
        SUBMISSION_PLUGIN_NAME: ${{ inputs.submission_plugin_name }}
        SUBMISSION_PLUGIN_URL: ${{ inputs.submission_plugin_url }}
        SUBMISSION_PLUGIN_DESCRIPTION: ${{ inputs.submission_plugin_description }}
        SUBMISSION_AUTHOR: ${{ inputs.submission_author }}
        GITHUB_STEP_SUMMARY: ${{ env.GITHUB_STEP_SUMMARY }}
      run: python3 -m codex_plugin_scanner.action_runner

    - name: Derive action outcome
      id: outcome
      shell: bash
      run: |
        if [ "${{ steps.scan.outcome }}" = "failure" ]; then
          echo "action_exit_code=1" >> "$GITHUB_OUTPUT"
          echo "action_exit_reason=scanner command failed before completion" >> "$GITHUB_OUTPUT"
        else
          echo "action_exit_code=0" >> "$GITHUB_OUTPUT"
          echo "action_exit_reason=" >> "$GITHUB_OUTPUT"
        fi

    - name: Publish sticky PR comment
      id: pr_comment
      uses: actions/github-script@v7
      env:
        PR_COMMENT_MODE: ${{ inputs.pr_comment }}
        PR_COMMENT_STYLE: ${{ inputs.pr_comment_style }}
        PR_COMMENT_HEADER: ${{ inputs.pr_comment_header }}
        PR_COMMENT_MAX_FINDINGS: ${{ inputs.pr_comment_max_findings }}
        PR_COMMENT_SKIP_IF_UNCHANGED: ${{ inputs.pr_comment_skip_if_unchanged }}
        PR_COMMENT_COMPARE_TO_PREVIOUS: ${{ inputs.pr_comment_compare_to_previous }}
        SCAN_OUTCOME: ${{ steps.scan.outcome }}
        SCAN_MODE: ${{ inputs.mode }}
        SCAN_PROFILE: ${{ inputs.profile }}
        SCAN_PLUGIN_DIR: ${{ inputs.plugin_dir }}
        SCAN_FORMAT: ${{ inputs.format }}
        SCAN_OUTPUT_PATH: ${{ inputs.output }}
        SCAN_REPORT_PATH: ${{ steps.scan.outputs.report_path }}
        SCAN_SCORE: ${{ steps.scan.outputs.score }}
        SCAN_GRADE: ${{ steps.scan.outputs.grade }}
        SCAN_GRADE_LABEL: ${{ steps.scan.outputs.grade_label }}
        SCAN_POLICY_PASS: ${{ steps.scan.outputs.policy_pass }}
        SCAN_VERIFY_PASS: ${{ steps.scan.outputs.verify_pass }}
        SCAN_MAX_SEVERITY: ${{ steps.scan.outputs.max_severity }}
        SCAN_FINDINGS_TOTAL: ${{ steps.scan.outputs.findings_total }}
        SCAN_SUBMISSION_ELIGIBLE: ${{ steps.scan.outputs.submission_eligible }}
        SCAN_SUBMISSION_URLS: ${{ steps.scan.outputs.submission_issue_urls }}
      with:
        github-token: ${{ inputs.pr_comment_token != '' && inputs.pr_comment_token || github.token }}
        script: |
          const fs = require("node:fs");

          const mode = (process.env.PR_COMMENT_MODE || "off").toLowerCase().trim();
          const style = (process.env.PR_COMMENT_STYLE || "concise").toLowerCase().trim();
          const explicitHeader = (process.env.PR_COMMENT_HEADER || "").trim();
          const rawMaxFindings = process.env.PR_COMMENT_MAX_FINDINGS ?? "";
          const parsedMaxFindings = Number.parseInt(rawMaxFindings, 10);
          const maxFindings = Number.isNaN(parsedMaxFindings) ? 3 : Math.max(0, parsedMaxFindings);
          const skipIfUnchanged = (process.env.PR_COMMENT_SKIP_IF_UNCHANGED || "true").toLowerCase() === "true";
          const compareToPrevious = (process.env.PR_COMMENT_COMPARE_TO_PREVIOUS || "true").toLowerCase() === "true";
          const eventName = context.eventName;
          const issueNumber = context.payload?.pull_request?.number;

          const setOutcome = (status, reason = "", url = "", id = "") => {
            core.setOutput("pr_comment_status", status);
            core.setOutput("pr_comment_reason", reason);
            core.setOutput("pr_comment_url", url);
            core.setOutput("pr_comment_id", id);
          };
          const failOrSkip = (reason) => {
            if (mode === "always") {
              setOutcome("failed", reason);
              core.setFailed(`pull request comment failed: ${reason}`);
              return true;
            }
            setOutcome("skipped", reason);
            return true;
          };

          if (mode === "off") {
            setOutcome("disabled");
            return;
          }

          try {
            if (!["pull_request", "pull_request_target"].includes(eventName)) {
              failOrSkip("not a pull request event");
              return;
            }
            if (!issueNumber) {
              failOrSkip("no pull request number in event payload");
              return;
            }

            const scanMode = process.env.SCAN_MODE || "scan";
            const scanProfile = process.env.SCAN_PROFILE || "default";
            const scanPluginDir = process.env.SCAN_PLUGIN_DIR || ".";
            const scanOutcome = process.env.SCAN_OUTCOME || "success";
            const score = process.env.SCAN_SCORE || "";
            const grade = process.env.SCAN_GRADE || "";
            const gradeLabel = process.env.SCAN_GRADE_LABEL || "";
            const maxSeverity = process.env.SCAN_MAX_SEVERITY || (scanOutcome === "failure" ? "unknown" : "none");
            const findingsTotal = process.env.SCAN_FINDINGS_TOTAL || "";
            const policyPass = process.env.SCAN_POLICY_PASS || "";
            const verifyPass = process.env.SCAN_VERIFY_PASS || "";
            const submissionEligible = process.env.SCAN_SUBMISSION_ELIGIBLE || "";
            const submissionUrls = (process.env.SCAN_SUBMISSION_URLS || "").split(",").filter(Boolean);
            const pullRequestUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/pull/${issueNumber}`;
            const checksUrl = `${pullRequestUrl}/checks`;
            const scanFormat = process.env.SCAN_FORMAT || "text";
            const configuredOutputPath = process.env.SCAN_OUTPUT_PATH || "";
            const emittedReportPath = process.env.SCAN_REPORT_PATH || "";
            const scanOutputPathCandidates = [configuredOutputPath, emittedReportPath].filter(Boolean);
            const scanOutputPath = scanOutputPathCandidates.find((candidate) => fs.existsSync(candidate)) || scanOutputPathCandidates[0] || "";

            const computedHeader = explicitHeader || `mode=${scanMode};profile=${scanProfile};target=${scanPluginDir}`;
            const marker = `<!-- hol-codex-plugin-scanner:${computedHeader} -->`;
            const dataPrefix = "<!-- hol-codex-plugin-scanner-data:";
            const dataSuffix = " -->";
            const severityRank = { none: 0, info: 1, low: 2, medium: 3, high: 4, critical: 5, unknown: 6 };
            const normalizeSarifSeverity = (value) => {
              const lowered = String(value || "").toLowerCase();
              if (["critical", "high"].includes(lowered)) return lowered;
              if (["error"].includes(lowered)) return "high";
              if (["warning", "medium"].includes(lowered)) return "medium";
              if (["low"].includes(lowered)) return "low";
              return "info";
            };

            let reportJson = null;
            let reportText = "";
            if (scanOutputPath && fs.existsSync(scanOutputPath)) {
              reportText = fs.readFileSync(scanOutputPath, "utf8");
              if (scanFormat === "json" || scanFormat === "sarif") {
                try {
                  reportJson = JSON.parse(reportText);
                } catch {
                  reportJson = null;
                }
              }
            }

            let findings = [];
            let hasStructuredFindings = false;
            if (Array.isArray(reportJson?.findings)) {
              findings = reportJson.findings;
              hasStructuredFindings = true;
            } else if (Array.isArray(reportJson?.runs)) {
              findings = reportJson.runs
                .flatMap((run) => (Array.isArray(run?.results) ? run.results : []))
                .map((result) => {
                  const message = typeof result?.message?.text === "string" ? result.message.text : "";
                  const ruleId = typeof result?.ruleId === "string" ? result.ruleId : "SARIF finding";
                  return {
                    severity: normalizeSarifSeverity(result?.properties?.severity || result?.level),
                    title: message || ruleId,
                  };
                });
              hasStructuredFindings = true;
            }
            findings.sort((a, b) => {
              const aRank = severityRank[String(a?.severity || "none")] || 0;
              const bRank = severityRank[String(b?.severity || "none")] || 0;
              if (aRank !== bRank) return bRank - aRank;
              return String(a?.title || "").localeCompare(String(b?.title || ""));
            });
            const topFindings = findings.slice(0, maxFindings);
            const truncateText = (value, maxLength = 200) => {
              if (typeof value !== "string") return "";
              const normalized = value.replace(/\s+/g, " ").trim();
              if (normalized.length <= maxLength) return normalized;
              return `${normalized.slice(0, Math.max(0, maxLength - 1))}…`;
            };
            const escapeInlineMarkdown = (value) =>
              String(value || "")
                .replace(/\\/g, "\\\\")
                .replace(/`/g, "\\`")
                .replace(/\|/g, "\\|")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;");
            const severityIcon = (severity) => {
              const key = String(severity || "").toLowerCase();
              if (key === "critical") return "🔴";
              if (key === "high") return "🟠";
              if (key === "medium") return "🟡";
              if (key === "low") return "🔵";
              if (key === "info") return "⚪";
              return "⚫";
            };

            const statusBadge = (value, unknownLabel = "N/A") => {
              if (value === "true") return "✅ Pass";
              if (value === "false") return "❌ Fail";
              return `➖ ${unknownLabel}`;
            };
            const severityBuckets = ["critical", "high", "medium", "low", "info"];
            const severityCounts = Object.fromEntries(severityBuckets.map((key) => [key, 0]));
            for (const finding of findings) {
              const key = String(finding?.severity || "").toLowerCase();
              if (key in severityCounts) {
                severityCounts[key] += 1;
              }
            }

            const scannerPassed = scanOutcome === "success";
            const scoreText = score ? `${score}/100` : "N/A";
            const gradeText = grade ? `${grade}${gradeLabel ? ` — ${gradeLabel}` : ""}` : "N/A";
            const findingCountText = findingsTotal || `${findings.length}`;
            const findingCount = Number.parseInt(findingsTotal || "", 10);
            const hasReportedFindings = Number.isFinite(findingCount) ? findingCount > 0 : findings.length > 0;
            const verdictEmoji = scannerPassed ? "✅" : "❌";
            const verdictText = scannerPassed ? "Scanner checks passed" : "Scanner checks failed";
            const targetText = `\`${escapeInlineMarkdown(scanPluginDir)}\``;
            const overallGatePass = scannerPassed && policyPass !== "false" && verifyPass !== "false";
            const overallLabel = overallGatePass ? "Ready" : "Needs Attention";
            const overallSummary = overallGatePass
              ? "Quality gates passed for this run."
              : "One or more quality gates failed in this run.";
            const gateChecklist = (name, value) => {
              if (value === "true") return `- [x] ${name}`;
              if (value === "false") return `- [ ] ${name}`;
              return `- [-] ${name}`;
            };

            const lines = [
              `## ${verdictEmoji} HOL Codex Plugin Scanner · ${overallLabel}`,
              "",
              `${verdictText} for ${targetText}`,
              "",
              `> \`${escapeInlineMarkdown(scanMode)}\` · profile \`${escapeInlineMarkdown(scanProfile)}\` · target ${targetText}`,
              "",
              `> ${overallSummary}`,
              "",
              "### Snapshot",
              "",
              `- **Score:** \`${escapeInlineMarkdown(scoreText)}\``,
              `- **Grade:** \`${escapeInlineMarkdown(gradeText)}\``,
              `- **Findings:** \`${escapeInlineMarkdown(findingCountText)}\``,
              `- **Max severity:** \`${escapeInlineMarkdown(maxSeverity || "none")}\``,
              `- **Checks:** [View workflow checks](${checksUrl})`,
              "",
              "### Gate Status",
              "",
              gateChecklist("Scanner run", scannerPassed ? "true" : "false"),
              gateChecklist(`Policy profile (${escapeInlineMarkdown(scanProfile)})`, policyPass),
              gateChecklist("Runtime verify", verifyPass),
              gateChecklist("Submission eligible", submissionEligible),
            ];

            if (hasStructuredFindings) {
              lines.push(
                "",
                "### Severity Mix",
                "",
                `🔴 \`critical ${severityCounts.critical}\` · 🟠 \`high ${severityCounts.high}\` · 🟡 \`medium ${severityCounts.medium}\` · 🔵 \`low ${severityCounts.low}\` · ⚪ \`info ${severityCounts.info}\``
              );
            } else {
              lines.push(
                "",
                "### Severity Mix",
                "",
                `- Unavailable: report format \`${escapeInlineMarkdown(scanFormat)}\` is not machine-parseable for breakdowns in this step.`,
                "- Use `format: json` or `format: sarif` to include severity distribution and detailed findings."
              );
            }

            if (submissionUrls.length > 0) {
              lines.push("", "Submission issues:");
              for (const url of submissionUrls) {
                lines.push(`- [Open issue](${url})`);
              }
            }

            const snapshot = {
              mode: scanMode,
              profile: scanProfile,
              plugin_dir: scanPluginDir,
              scan_outcome: scanOutcome,
              score: score ? Number.parseInt(score, 10) : null,
              findings_total: findingsTotal ? Number.parseInt(findingsTotal, 10) : null,
              max_severity: maxSeverity || null,
            };

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              per_page: 100,
            });

            const matching = comments
              .filter((comment) => typeof comment.body === "string" && comment.body.includes(marker))
              .sort((a, b) => new Date(b.updated_at).getTime() - new Date(a.updated_at).getTime());
            const current = matching[0] ?? null;
            const previous = matching[1] ?? null;
            const baselineComment = previous ?? current;

            if (compareToPrevious && baselineComment && typeof baselineComment.body === "string") {
              const start = baselineComment.body.indexOf(dataPrefix);
              if (start >= 0) {
                const end = baselineComment.body.indexOf(dataSuffix, start);
                if (end > start) {
                  try {
                    const encoded = baselineComment.body.slice(start + dataPrefix.length, end).trim();
                    const prior = JSON.parse(Buffer.from(encoded, "base64").toString("utf8"));
                    const deltas = [];
                    if (typeof snapshot.score === "number" && typeof prior.score === "number") {
                      const delta = snapshot.score - prior.score;
                      if (delta !== 0) {
                        deltas.push(`score ${delta > 0 ? "+" : ""}${delta}`);
                      }
                    }
                    if (typeof snapshot.findings_total === "number" && typeof prior.findings_total === "number") {
                      const delta = snapshot.findings_total - prior.findings_total;
                      if (delta !== 0) {
                        deltas.push(`findings ${delta > 0 ? "+" : ""}${delta}`);
                      }
                    }
                    if (deltas.length > 0) {
                      lines.push("", "### Delta vs Previous Run", "", `\`${escapeInlineMarkdown(deltas.join(" | "))}\``);
                    }
                  } catch {
                    // Ignore malformed historical payloads
                  }
                }
              }
            }

            if (hasStructuredFindings && topFindings.length > 0) {
              lines.push("", "### Top Findings", "");
              for (let i = 0; i < topFindings.length; i += 1) {
                const finding = topFindings[i];
                const severity = String(finding?.severity || "unknown").toLowerCase();
                const title = escapeInlineMarkdown(truncateText(String(finding?.title || "Untitled finding"), 220));
                lines.push(`${i + 1}. ${severityIcon(severity)} \`${escapeInlineMarkdown(severity)}\` ${title}`);
              }
            } else if (hasStructuredFindings) {
              lines.push("", "### Top Findings", "", "- No findings to highlight.");
            } else if (hasReportedFindings) {
              lines.push(
                "",
                "### Top Findings",
                "",
                `- Scanner reported \`${escapeInlineMarkdown(findingCountText)}\` findings, but detailed entries are unavailable for \`${escapeInlineMarkdown(scanFormat)}\` output.`,
                "- Set `format: json` or `format: sarif` to include top findings in PR comments."
              );
            } else {
              lines.push("", "### Top Findings", "", "- No findings to highlight.");
            }

            if (style === "full" && reportText.trim().length > 0) {
              const codeFence = scanFormat === "json" || scanFormat === "sarif" ? "json" : "text";
              lines.push(
                "",
                "<details>",
                "<summary>Raw scanner report</summary>",
                "",
                `\`\`\`${codeFence}`,
                reportText.trim(),
                "```",
                "",
                "</details>"
              );
            }

            const encodedSnapshot = Buffer.from(JSON.stringify(snapshot), "utf8").toString("base64");
            const footer = `\n\n${marker}\n${dataPrefix}${encodedSnapshot}${dataSuffix}`;
            const maxCommentLength = 65536;
            const truncateNotice = "\n\n... [report truncated due to size limit]";
            let bodyContent = lines.join("\n");
            if (bodyContent.length + footer.length > maxCommentLength) {
              const maxBodyContent = Math.max(0, maxCommentLength - footer.length - truncateNotice.length);
              bodyContent = `${bodyContent.slice(0, maxBodyContent)}${truncateNotice}`;
            }
            const body = `${bodyContent}${footer}`;

            if (current && skipIfUnchanged && current.body === body) {
              setOutcome("unchanged", "", current.html_url, String(current.id));
              return;
            }

            try {
              if (current) {
                const { data } = await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: current.id,
                  body,
                });
                setOutcome("updated", "", data.html_url, String(data.id));
              } else {
                const { data } = await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                  body,
                });
                setOutcome("created", "", data.html_url, String(data.id));
              }
            } catch (error) {
              const message = error instanceof Error ? error.message : "unknown error";
              if (mode === "always") {
                setOutcome("failed", message);
                core.setFailed(`pull request comment failed: ${message}`);
                return;
              }
              setOutcome("skipped", `comment publication failed: ${message}`);
            }
          } catch (error) {
            const message = error instanceof Error ? error.message : "unknown error";
            if (mode === "always") {
              setOutcome("failed", message);
              core.setFailed(`pull request comment failed: ${message}`);
              return;
            }
            setOutcome("skipped", `comment publication failed: ${message}`);
          }

    - name: Upload SARIF
      if: ${{ always() && inputs.upload_sarif == 'true' && inputs.mode == 'scan' && steps.scan.outputs.report_path != '' }}
      uses: github/codeql-action/upload-sarif@51f77329afa6477de8c49fc9c7046c15b9a4e79d
      with:
        sarif_file: ${{ steps.scan.outputs.report_path }}
        category: ${{ inputs.sarif_category }}

    - name: Enforce scanner execution
      if: ${{ steps.scan.outcome == 'failure' }}
      shell: bash
      run: |
        if [ -n "${{ steps.outcome.outputs.action_exit_reason }}" ]; then
          echo "${{ steps.outcome.outputs.action_exit_reason }}" >&2
        fi
        exit 1
